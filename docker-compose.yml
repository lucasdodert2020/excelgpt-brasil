services:
  postgres:
    image: postgres:16-alpine
    container_name: excelgpt-brasil-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: excelgpt_brasil
      POSTGRES_USER: excelgpt
      POSTGRES_PASSWORD: excelgpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

